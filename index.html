<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제주기상과학홍보관 날씨탐험</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", sans-serif;
      background: #eaf7ff;
      color: #222;
      line-height: 1.6;
    }

    header {
      background: linear-gradient(135deg, #4facfe, #00c6fb);
      color: white;
      text-align: center;
      padding: 40px 20px;
    }

    header h1 {
      margin: 0;
      font-size: 2rem;
    }

    header p {
      margin-top: 10px;
      font-size: 1rem;
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
    }

    .question {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-size: 1rem;
      cursor: pointer;
      background: #f0f4ff;
      transition: 0.2s;
    }

    button:hover {
      background: #dce8ff;
      transform: scale(1.02);
    }

    .result {
      margin-top: 15px;
      font-weight: bold;
      font-size: 1.1rem;
    }

    .correct {
      color: #0a9b35;
    }

    .wrong {
      color: #d93025;
    }

    .score-box {
      text-align: center;
      background: #fff8d6;
    }

    .score {
      font-size: 2rem;
      margin: 20px 0;
      color: #ff8c00;
    }

    footer {
      text-align: center;
      padding: 30px 10px;
      color: #666;
      font-size: 0.9rem;
    }

    .emoji {
      font-size: 1.5rem;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 1.6rem;
      }

      .question {
        font-size: 1.1rem;
      }

      button {
        font-size: 0.95rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>🌤 제주 날씨탐험</h1>
    <p>제주기상과학홍보관과 함께하는 신나는 체험!</p>
  </header>

  <div class="container">

    <!-- 문제 1 -->
    <div class="card">
      <div class="question">
        1️⃣ 한라산 분화구의 이름은 무엇일까요?
      </div>

      <div class="btn-group">
        <button onclick="checkAnswer(this, false)">천지</button>
        <button onclick="checkAnswer(this, true)">백록담</button>
      </div>

      <div class="result"></div>
    </div>

    <!-- 문제 2 -->
    <div class="card">
      <div class="question">
        2️⃣ 한라산은 죽은 화산이다.
      </div>

      <div class="btn-group">
        <button onclick="checkAnswer(this, true)">O</button>
        <button onclick="checkAnswer(this, false)">X</button>
      </div>

      <div class="result"></div>
    </div>

    <!-- 문제 3 -->
    <div class="card">
      <div class="question">
        3️⃣ 지진이 발생했을 때 엘리베이터를 타고 대피한다.
      </div>

      <div class="btn-group">
        <button onclick="checkAnswer(this, false)">O</button>
        <button onclick="checkAnswer(this, true)">X</button>
      </div>

      <div class="result"></div>
    </div>

    <!-- 문제 4 -->
    <div class="card">
      <div class="question">
        4️⃣ 달무리가 지면 비가 올 가능성이 높다.
      </div>

      <div class="btn-group">
        <button onclick="checkAnswer(this, true)">O</button>
        <button onclick="checkAnswer(this, false)">X</button>
      </div>

      <div class="result"></div>
    </div>

    <!-- 문제 5 -->
    <div class="card">
      <div class="question">
        5️⃣ 토네이도를 보고 옛날 사람들은 무엇이 하늘로 올라간다고 생각했을까요?
      </div>

      <div class="btn-group">
        <button onclick="checkAnswer(this, true)">용</button>
        <button onclick="checkAnswer(this, false)">호랑이</button>
        <button onclick="checkAnswer(this, false)">독수리</button>
      </div>

      <div class="result"></div>
    </div>

    <!-- 점수 -->
    <div class="card score-box">
      <h2>🎉 체험 완료!</h2>

      <div class="score">
        점수: <span id="score">0</span> / 5
      </div>

      <p id="message">
        문제를 모두 풀어보세요!
      </p>
    </div>

  </div>

  <footer>
    제주기상과학홍보관 🌈<br>
    다음에 또 놀러오세요!
  </footer>

  <script>
    let score = 0;
    let solved = 0;

    function checkAnswer(button, isCorrect) {

      const card = button.closest(".card");
      const result = card.querySelector(".result");

      if (card.dataset.solved === "true") {
        return;
      }

      card.dataset.solved = "true";

      solved++;

      if (isCorrect) {
        result.innerHTML = "✅ 정답입니다!";
        result.className = "result correct";
        score++;
      } else {
        result.innerHTML = "❌ 아쉬워요!";
        result.className = "result wrong";
      }

      document.getElementById("score").innerText = score;

      if (solved === 5) {
        const message = document.getElementById("message");

        if (score === 5) {
          message.innerHTML = "🏆 완벽해요! 당신은 날씨박사!";
        } else if (score >= 3) {
          message.innerHTML = "🌤 아주 잘했어요!";
        } else {
          message.innerHTML = "📚 다시 도전해보세요!";
        }
      }
    }
  </script>

</body>
</html>
