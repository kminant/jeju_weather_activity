<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>제주 날씨탐험</title>

<style>

body{
    margin:0;
    font-family:'Pretendard', sans-serif;
    background:#eaf7ff;
    color:#222;
}

.screen{
    display:none;
    min-height:100vh;
    padding:30px 20px;
    justify-content:center;
    align-items:center;
}

.active{
    display:flex;
}

.card{
    width:100%;
    max-width:600px;
    background:white;
    border-radius:25px;
    padding:30px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
    text-align:center;
}

h1{
    color:#0084ff;
}

.question{
    font-size:1.4rem;
    font-weight:bold;
    margin:30px 0;
    line-height:1.5;
}

button{
    width:100%;
    border:none;
    border-radius:15px;
    padding:18px;
    margin:10px 0;
    font-size:1rem;
    cursor:pointer;
    background:#edf4ff;
    transition:0.2s;
}

button:hover{
    background:#d8e9ff;
}

.result{
    margin-top:20px;
    font-size:1.2rem;
    font-weight:bold;
}

.correct{
    color:green;
}

.wrong{
    color:red;
}

.next-btn{
    background:#0084ff;
    color:white;
    margin-top:25px;
}

.next-btn:hover{
    background:#006fe0;
}

.score{
    font-size:2rem;
    color:#ff8c00;
    margin:20px 0;
}

</style>
</head>

<body>

<!-- 시작 화면 -->
<div class="screen active" id="screen0">
    <div class="card">
        <h1>🌤 제주 날씨탐험</h1>

        <p>
            제주기상과학홍보관과 함께하는<br>
            신나는 기상 체험!
        </p>

        <button onclick="nextScreen(1)">
            시작하기 ▶
        </button>
    </div>
</div>

<!-- 문제1 -->
<div class="screen" id="screen1">
    <div class="card">

        <div class="question">
            1️⃣ 한라산 분화구의 이름은 무엇일까요?
        </div>

        <button onclick="answer(this,true,1)">
            백록담
        </button>

        <button onclick="answer(this,false,1)">
            천지
        </button>

        <div class="result" id="result1"></div>

    </div>
</div>

<!-- 문제2 -->
<div class="screen" id="screen2">
    <div class="card">

        <div class="question">
            2️⃣ 한라산은 죽은 화산이다.
        </div>

        <button onclick="answer(this,true,2)">
            O
        </button>

        <button onclick="answer(this,false,2)">
            X
        </button>

        <div class="result" id="result2"></div>

    </div>
</div>

<!-- 문제3 -->
<div class="screen" id="screen3">
    <div class="card">

        <div class="question">
            3️⃣ 지진이 발생했을 때 엘리베이터를 탄다.
        </div>

        <button onclick="answer(this,false,3)">
            O
        </button>

        <button onclick="answer(this,true,3)">
            X
        </button>

        <div class="result" id="result3"></div>

    </div>
</div>

<!-- 문제4 -->
<div class="screen" id="screen4">
    <div class="card">

        <div class="question">
            4️⃣ 달무리가 지면 비가 올 가능성이 높다.
        </div>

        <button onclick="answer(this,true,4)">
            O
        </button>

        <button onclick="answer(this,false,4)">
            X
        </button>

        <div class="result" id="result4"></div>

    </div>
</div>

<!-- 완료 -->
<div class="screen" id="screen5">
    <div class="card">

        <h1>🎉 체험 완료!</h1>

        <div class="score">
            <span id="finalScore"></span> / 4
        </div>

        <p id="finalMessage"></p>

        <button onclick="location.reload()">
            다시하기 🔄
        </button>

    </div>
</div>

<script>

let score = 0;

function nextScreen(number){

    document.querySelectorAll(".screen").forEach(screen=>{
        screen.classList.remove("active");
    });

    document.getElementById("screen"+number).classList.add("active");
}

function answer(button, correct, questionNumber){

    const result = document.getElementById("result"+questionNumber);

    const buttons = button.parentElement.querySelectorAll("button");

    buttons.forEach(btn=>{
        btn.disabled = true;
    });

    if(correct){

        score++;

        result.innerHTML = "✅ 정답입니다!";
        result.className = "result correct";

    }else{

        result.innerHTML = "❌ 아쉬워요!";
        result.className = "result wrong";
    }

    const nextBtn = document.createElement("button");

    nextBtn.className = "next-btn";

    if(questionNumber < 4){

        nextBtn.innerHTML = "다음 문제 ▶";

        nextBtn.onclick = ()=>{
            nextScreen(questionNumber + 1);
        };

    }else{

        nextBtn.innerHTML = "결과 보기 🎉";

        nextBtn.onclick = showResult;
    }

    button.parentElement.appendChild(nextBtn);
}

function showResult(){

    nextScreen(5);

    document.getElementById("finalScore").innerText = score;

    let message = "";

    if(score === 4){

        message = "🏆 완벽해요! 당신은 날씨박사!";

    }else if(score >= 2){

        message = "🌤 아주 잘했어요!";

    }else{

        message = "📚 다시 도전해보세요!";
    }

    document.getElementById("finalMessage").innerText = message;
}

</script>

</body>
</html>
